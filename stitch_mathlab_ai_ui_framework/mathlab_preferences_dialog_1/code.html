<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MathLab Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-on-surface": "#eaf1ff",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-surface": "#0b1c30",
                    "on-error-container": "#93000a",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed": "#00201d",
                    "surface-dim": "#cbdbf5",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#e2dfff",
                    "inverse-primary": "#b4c5ff",
                    "tertiary-fixed": "#89f5e7",
                    "surface-bright": "#f8f9ff",
                    "on-secondary-container": "#fffbff",
                    "on-primary-fixed-variant": "#003ea8",
                    "tertiary-fixed-dim": "#6bd8cb",
                    "surface-tint": "#0053db",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#c3c6d7",
                    "on-surface-variant": "#434655",
                    "on-tertiary-container": "#b3fff3",
                    "surface-variant": "#d3e4fe",
                    "secondary-container": "#645efb",
                    "on-secondary-fixed-variant": "#3323cc",
                    "inverse-surface": "#213145",
                    "error": "#ba1a1a",
                    "outline": "#737686",
                    "surface-container-low": "#eff4ff",
                    "secondary-fixed-dim": "#c3c0ff",
                    "on-tertiary-fixed-variant": "#005049",
                    "primary-fixed": "#dbe1ff",
                    "surface-container": "#e5eeff",
                    "surface-container-high": "#dce9ff",
                    "surface": "#f8f9ff",
                    "on-secondary": "#ffffff",
                    "on-primary-container": "#eeefff",
                    "on-primary-fixed": "#00174b",
                    "background": "#f8f9ff",
                    "tertiary-container": "#007b71",
                    "tertiary": "#006058",
                    "primary-container": "#2563eb",
                    "on-background": "#0b1c30",
                    "on-secondary-fixed": "#0f0069",
                    "surface-container-highest": "#d3e4fe",
                    "secondary": "#4b41e1",
                    "primary": "#004ac6",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "panel-gap": "1px",
                    "lg": "24px",
                    "xl": "32px",
                    "unit": "4px",
                    "md": "16px",
                    "container-padding": "12px",
                    "xs": "4px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "code": ["monospace"],
                    "display": ["Inter"],
                    "body-sm": ["Inter"],
                    "body-base": ["Inter"],
                    "headline": ["Inter"],
                    "label-caps": ["Inter"]
            },
            "fontSize": {
                    "code": ["13px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "display": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                    "body-base": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-caps": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
        }
        /* Custom scrollbar for professional tool look */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c3c6d7; /* outline-variant */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #737686; /* outline */
        }
        /* Hide scrollbar for sidebar to keep it clean */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-surface-container font-body-base text-on-surface antialiased h-screen w-screen overflow-hidden flex items-center justify-center">
<!-- Mock Background App Canvas -->
<div aria-hidden="true" class="absolute inset-0 z-0 flex">
<div class="w-[280px] h-full border-r border-outline-variant bg-surface-container-lowest"></div>
<div class="flex-1 h-full bg-surface" style="background-image: radial-gradient(#c3c6d7 1px, transparent 1px); background-size: 20px 20px;"></div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 bg-inverse-surface/40 z-40 flex items-center justify-center backdrop-blur-[1px]">
<!-- Dialog Container -->
<div class="w-full max-w-[800px] h-[560px] bg-surface rounded flex flex-col shadow-[0_0_24px_rgba(0,0,0,0.15)] border border-outline-variant relative z-50 overflow-hidden">
<!-- Header -->
<header class="h-[48px] bg-surface-bright border-b border-outline-variant flex items-center justify-between px-lg shrink-0">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-outline text-[20px]">settings</span>
<h2 class="font-headline text-headline text-on-surface">MathLab Settings</h2>
</div>
<button aria-label="Close" class="w-8 h-8 flex items-center justify-center text-outline hover:text-on-surface hover:bg-surface-container-low rounded transition-colors">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</header>
<!-- Body Layout -->
<div class="flex flex-1 min-h-0">
<!-- Sidebar (Tabs) -->
<nav class="w-[220px] bg-surface-container-lowest border-r border-outline-variant py-sm flex flex-col gap-unit shrink-0 no-scrollbar overflow-y-auto">
<button class="w-full text-left px-md py-sm flex items-center gap-sm bg-surface-variant text-on-surface border-l-[3px] border-primary">
<span class="material-symbols-outlined text-[18px]">palette</span>
<span class="font-body-base">Appearance</span>
</button>
<button class="w-full text-left px-md py-sm flex items-center gap-sm text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface border-l-[3px] border-transparent transition-colors">
<span class="material-symbols-outlined text-[18px]">polyline</span>
<span class="font-body-base">Graphics</span>
</button>
<button class="w-full text-left px-md py-sm flex items-center gap-sm text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface border-l-[3px] border-transparent transition-colors">
<span class="material-symbols-outlined text-[18px]">terminal</span>
<span class="font-body-base">Console</span>
</button>
<button class="w-full text-left px-md py-sm flex items-center gap-sm text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface border-l-[3px] border-transparent transition-colors">
<span class="material-symbols-outlined text-[18px]">keyboard</span>
<span class="font-body-base">Shortcuts</span>
</button>
<button class="w-full text-left px-md py-sm flex items-center gap-sm text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface border-l-[3px] border-transparent transition-colors">
<span class="material-symbols-outlined text-[18px]">tune</span>
<span class="font-body-base">Advanced</span>
</button>
</nav>
<!-- Content Area (Continuous Scroll) -->
<main class="flex-1 bg-surface p-xl overflow-y-auto flex flex-col gap-xl">
<!-- Section: Appearance -->
<section class="flex flex-col gap-md" id="appearance">
<h3 class="font-label-caps text-label-caps text-primary uppercase border-b border-outline-variant pb-xs">Appearance</h3>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Theme</label>
<select class="h-xl px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none w-full max-w-[240px]">
<option>Light</option>
<option>Dark</option>
<option selected="">System Default</option>
</select>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Accent Color</label>
<div class="flex items-center gap-sm">
<button aria-label="Blue" class="w-6 h-6 rounded-full bg-primary ring-2 ring-primary ring-offset-2 ring-offset-surface"></button>
<button aria-label="Green" class="w-6 h-6 rounded-full bg-tertiary hover:opacity-80 transition-opacity border border-outline-variant"></button>
<button aria-label="Purple" class="w-6 h-6 rounded-full bg-secondary hover:opacity-80 transition-opacity border border-outline-variant"></button>
<button aria-label="Orange" class="w-6 h-6 rounded-full bg-[#f97316] hover:opacity-80 transition-opacity border border-outline-variant"></button>
</div>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Interface Font</label>
<select class="h-xl px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none w-full max-w-[240px]">
<option selected="">Inter</option>
<option>Roboto</option>
<option>System UI</option>
</select>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Canvas Background</label>
<select class="h-xl px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none w-full max-w-[240px]">
<option selected="">Grid</option>
<option>Blank</option>
<option>Polar Grid</option>
</select>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Language</label>
<select class="h-xl px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none w-full max-w-[240px]">
<option selected="">English</option>
<option>Chinese (Simplified)</option>
</select>
</div>
</section>
<!-- Section: Graphics -->
<section class="flex flex-col gap-md" id="graphics">
<h3 class="font-label-caps text-label-caps text-primary uppercase border-b border-outline-variant pb-xs">Graphics</h3>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Default Line Width</label>
<div class="flex items-center gap-sm">
<input class="h-xl w-[80px] px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none text-right" step="0.5" type="number" value="1.5"/>
<span class="font-body-sm text-on-surface-variant">px</span>
</div>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Default Point Size</label>
<div class="flex items-center gap-sm">
<input class="h-xl w-[80px] px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none text-right" step="0.5" type="number" value="4.0"/>
<span class="font-body-sm text-on-surface-variant">px</span>
</div>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Anti-aliasing</label>
<label class="flex items-center gap-sm cursor-pointer">
<input checked="" class="w-4 h-4 rounded-sm border-outline text-primary focus:ring-primary bg-surface-container-lowest" type="checkbox"/>
<span class="font-body-sm text-on-surface">Enable multi-sample anti-aliasing</span>
</label>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Animation Speed</label>
<div class="flex items-center gap-md w-full max-w-[240px]">
<span class="font-body-sm text-outline">Slow</span>
<input class="flex-1 h-1 bg-outline-variant rounded-full appearance-none accent-primary" max="100" min="1" type="range" value="50"/>
<span class="font-body-sm text-outline">Fast</span>
</div>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Snapping</label>
<select class="h-xl px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none w-full max-w-[240px]">
<option selected="">To Grid</option>
<option>To Points/Intersections</option>
<option>Off</option>
</select>
</div>
</section>
<!-- Section: Console -->
<section class="flex flex-col gap-md" id="console">
<h3 class="font-label-caps text-label-caps text-primary uppercase border-b border-outline-variant pb-xs">Console</h3>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Font Settings</label>
<div class="flex items-center gap-sm max-w-[320px]">
<select class="flex-1 h-xl px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none">
<option selected="">Monaco</option>
<option>Consolas</option>
<option>Fira Code</option>
</select>
<input class="h-xl w-[60px] px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none text-center" type="number" value="13"/>
</div>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Color Scheme</label>
<select class="h-xl px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none w-full max-w-[240px]">
<option selected="">Terminal (Dark)</option>
<option>Light</option>
<option>System</option>
</select>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Auto-complete</label>
<label class="flex items-center gap-sm cursor-pointer">
<input checked="" class="w-4 h-4 rounded-sm border-outline text-primary focus:ring-primary bg-surface-container-lowest" type="checkbox"/>
<span class="font-body-sm text-on-surface">Enable AI suggestions</span>
</label>
</div>
</section>
<!-- Section: Shortcuts -->
<section class="flex flex-col gap-md" id="shortcuts">
<h3 class="font-label-caps text-label-caps text-primary uppercase border-b border-outline-variant pb-xs">Shortcuts</h3>
<div class="border border-outline-variant rounded bg-surface-container-lowest overflow-hidden">
<table class="w-full text-left border-collapse">
<thead class="bg-surface-bright border-b border-outline-variant">
<tr>
<th class="py-xs px-sm font-label-caps text-on-surface-variant font-medium w-1/2">Action</th>
<th class="py-xs px-sm font-label-caps text-on-surface-variant font-medium w-1/2">Shortcut</th>
</tr>
</thead>
<tbody>
<tr class="border-b border-outline-variant last:border-0 hover:bg-surface-container-low">
<td class="py-sm px-sm font-body-sm text-on-surface">Save Project</td>
<td class="py-sm px-sm"><span class="font-code text-code bg-surface-variant text-on-surface px-unit py-[2px] rounded border border-outline-variant">Ctrl+S</span></td>
</tr>
<tr class="border-b border-outline-variant last:border-0 hover:bg-surface-container-low">
<td class="py-sm px-sm font-body-sm text-on-surface">Undo Last Action</td>
<td class="py-sm px-sm"><span class="font-code text-code bg-surface-variant text-on-surface px-unit py-[2px] rounded border border-outline-variant">Ctrl+Z</span></td>
</tr>
<tr class="border-b border-outline-variant last:border-0 hover:bg-surface-container-low">
<td class="py-sm px-sm font-body-sm text-on-surface">Clear Canvas</td>
<td class="py-sm px-sm"><span class="font-code text-code bg-surface-variant text-on-surface px-unit py-[2px] rounded border border-outline-variant">Ctrl+L</span></td>
</tr>
<tr class="border-b border-outline-variant last:border-0 hover:bg-surface-container-low">
<td class="py-sm px-sm font-body-sm text-on-surface">Focus Console</td>
<td class="py-sm px-sm"><span class="font-code text-code bg-surface-variant text-on-surface px-unit py-[2px] rounded border border-outline-variant">Ctrl+`</span></td>
</tr>
</tbody>
</table>
</div>
</section>
<!-- Section: Advanced -->
<section class="flex flex-col gap-md pb-xl" id="advanced">
<h3 class="font-label-caps text-label-caps text-primary uppercase border-b border-outline-variant pb-xs">Advanced</h3>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Hardware Acceleration</label>
<label class="flex items-center gap-sm cursor-pointer">
<input checked="" class="w-4 h-4 rounded-sm border-outline text-primary focus:ring-primary bg-surface-container-lowest" type="checkbox"/>
<span class="font-body-sm text-on-surface">Use GPU for rendering</span>
</label>
</div>
<div class="grid grid-cols-[180px_1fr] items-center gap-md">
<label class="font-body-sm text-on-surface-variant">Auto-save Interval</label>
<div class="flex items-center gap-sm">
<input class="h-xl w-[80px] px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-base focus:border-primary focus:ring-1 focus:ring-primary outline-none text-right" type="number" value="5"/>
<span class="font-body-sm text-on-surface-variant">minutes</span>
</div>
</div>
<div class="grid grid-cols-[180px_1fr] items-start gap-md mt-sm pt-sm border-t border-outline-variant border-dashed">
<label class="font-body-sm text-error pt-unit">Factory Reset</label>
<div>
<button class="h-xl px-md border border-error text-error bg-surface rounded hover:bg-error-container hover:text-on-error-container transition-colors font-body-sm flex items-center justify-center">
                                    Restore Default Settings
                                </button>
<p class="font-body-sm text-on-surface-variant mt-unit text-[10px]">This will revert all preferences to their original state.</p>
</div>
</div>
</section>
</main>
</div>
<!-- Footer Actions -->
<footer class="h-[64px] border-t border-outline-variant bg-surface-bright flex items-center justify-end px-lg gap-sm shrink-0">
<button class="h-xl px-md font-body-sm text-on-surface border border-outline bg-surface rounded flex items-center justify-center hover:bg-surface-container-low transition-colors">
                    Cancel
                </button>
<button class="h-xl px-md font-body-sm text-on-surface border border-outline bg-surface rounded flex items-center justify-center opacity-50 cursor-not-allowed">
                    Apply
                </button>
<button class="h-xl px-md font-body-sm text-on-primary bg-primary border border-transparent rounded flex items-center justify-center hover:bg-on-primary-fixed-variant transition-colors shadow-[inset_0_1px_0_rgba(255,255,255,0.2)]">
                    OK
                </button>
</footer>
</div>
</div>
</body></html>
