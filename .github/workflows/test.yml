name: CI - MathLab Automated Tests

on:
  push:
    branches: [ "main", "master", "dev" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: PyTest on Ubuntu
    runs-on: ubuntu-latest

    env:
      PYTEST_QT_API: pyside6

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mathlab/requirements.txt
        pip install -r mathlab/requirements-optional.txt
        pip install pytest pytest-qt

    - name: Install System Dependencies for Qt/WebEngine
      # 将 libegl1-mesa 替换为 libegl1，并补充其他 Qt 必须的底层库
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libegl1 libxcb-xinerama0 libxcb-cursor0 libxkbcommon-x11-0 libnss3 libasound2t64

    - name: Run Tests with xvfb
      # 使用 xvfb-run 包装 pytest 运行，模拟真实的图形界面环境
      run: |
        xvfb-run -a pytest mathlab/tests/ -v
