name: Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'mathlab/**.py'
      - 'mathlab/**.spec'
      - 'requirements.txt'
      - 'MathLab.CSharpEngine/**'
      - 'mathlab/resources/web_src/**'
      - '.github/workflows/test.yml'
      - '.github/workflows/_build-setup.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mathlab/**.py'
      - 'mathlab/**.spec'
      - 'requirements.txt'
      - 'MathLab.CSharpEngine/**'
      - 'mathlab/resources/web_src/**'
      - '.github/workflows/test.yml'
      - '.github/workflows/_build-setup.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '24'

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [ubuntu-24.04, windows-2022, macos-14]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build MathLab C# Engine
        run: dotnet build MathLab.CSharpEngine/MathLab.CSharpEngine.csproj -c Release

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mathlab/resources/web_src/package-lock.json

      - name: Build Webpack Frontend
        run: |
          cd mathlab/resources/web_src
          npm ci
          npm run build

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Linux GUI dependencies (xvfb)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xfixes0 x11-utils libegl1 libgl1 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-qt pytest-cov

      - name: Run unit tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: pytest mathlab/tests/unit/ -v --tb=long -m "not slow" --junitxml=test-results/unit-results.xml --cov=mathlab --cov-report=xml --cov-report=term-missing --cov-branch

      - name: Run unit tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pytest mathlab/tests/unit/ -v --tb=long -m "not slow" --junitxml=test-results/unit-results.xml --cov=mathlab --cov-report=xml --cov-report=term-missing --cov-branch

      - name: Run integration tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: pytest mathlab/tests/integration/ -v --tb=long -m "not slow" --junitxml=test-results/integration-results.xml --cov=mathlab --cov-append --cov-report=xml --cov-report=term-missing

      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pytest mathlab/tests/integration/ -v --tb=long -m "not slow" --junitxml=test-results/integration-results.xml --cov=mathlab --cov-append --cov-report=xml --cov-report=term-missing

      - name: Run e2e tests (Windows / macOS)
        if: runner.os != 'Linux'
        run: pytest mathlab/tests/e2e/ -v --tb=long --junitxml=test-results/e2e-results.xml --cov=mathlab --cov-append --cov-report=xml --cov-report=term-missing

      - name: Run e2e tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pytest mathlab/tests/e2e/ -v --tb=long --junitxml=test-results/e2e-results.xml --cov=mathlab --cov-append --cov-report=xml --cov-report=term-missing

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            test-results/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: |
            test-results/coverage.xml
            .coverage
          retention-days: 14
