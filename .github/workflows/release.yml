name: Auto Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # 仅匹配语义化版本标签，更严格

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # 发布任务不取消，避免中断打包

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [windows-2022, macos-14, ubuntu-24.04]

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@4d991eb9995541a0b71d1b66f1f98a5f1bef422c # v2.11.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # 完整历史，用于生成 changelog

      - name: Setup .NET
        uses: actions/setup-dotnet@6bd8b4f4d4ec0797b7c6f8503ce4f6db1d30a8d3 # v4.1.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build MathLab C# Engine
        run: dotnet build MathLab.CSharpEngine/MathLab.CSharpEngine.csproj -c Release

      - name: Configure Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mathlab/resources/web_src/package-lock.json

      - name: Build Webpack Frontend
        run: |
          cd mathlab/resources/web_src
          npm ci
          npm run build

      - name: Install dependencies & PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller mathlab.spec --clean

      # ── 修复脚本注入：通过 env 传递 ref_name，而非直接内联 ──────────────
      - name: Archive Windows build
        if: runner.os == 'Windows'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: Compress-Archive -Path dist/MathLab/* -DestinationPath "MathLab-${env:REF_NAME}-Windows.zip"

      - name: Archive macOS build
        if: runner.os == 'macOS'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          cd dist
          zip -r "../MathLab-${REF_NAME}-macOS.zip" MathLab.app

      - name: Archive Linux build
        if: runner.os == 'Linux'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          cd dist
          tar -czvf "../MathLab-${REF_NAME}-Linux.tar.gz" MathLab

      - name: Upload build artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: MathLab-${{ matrix.os }}-${{ github.ref_name }}
          path: |
            MathLab-*-Windows.zip
            MathLab-*-macOS.zip
            MathLab-*-Linux.tar.gz
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: build-and-release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@4d991eb9995541a0b71d1b66f1f98a5f1bef422c # v2.11.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "📦 已下载的构建产物："
          find artifacts -type f -name "*.zip" -o -name "*.tar.gz" | sort

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2.0.9
        with:
          files: |
            artifacts/MathLab-*-Windows.zip
            artifacts/MathLab-*-macOS.zip
            artifacts/MathLab-*-Linux.tar.gz
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
