name: CD - Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_suffix: Windows.exe
          - os: macos-latest
            asset_suffix: macOS.zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mathlab/requirements.txt
        pip install -r mathlab/requirements-optional.txt
        pip install pyinstaller

    - name: Set Asset Filename
      id: vars
      shell: bash
      run: |
        # Replace characters not allowed/safe in filenames
        SAFE_REF=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9.-]/_/g')
        echo "safe_ref=$SAFE_REF" >> $GITHUB_OUTPUT

    - name: Build with PyInstaller
      run: |
        cd mathlab
        pyinstaller build_spec.spec

    - name: Prepare Windows Asset
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        ASSET_PATH="mathlab/dist/MathLab-${{ steps.vars.outputs.safe_ref }}-Windows.exe"
        mv mathlab/dist/MathLab.exe "$ASSET_PATH"
        echo "ASSET_PATH=$ASSET_PATH" >> $GITHUB_ENV

    - name: Prepare macOS Asset
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        ASSET_PATH="MathLab-${{ steps.vars.outputs.safe_ref }}-macOS.zip"
        cd mathlab/dist
        zip -r "../../$ASSET_PATH" MathLab.app
        cd ../..
        echo "ASSET_PATH=$ASSET_PATH" >> $GITHUB_ENV

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MathLab-${{ matrix.os }}-${{ steps.vars.outputs.safe_ref }}
        path: ${{ env.ASSET_PATH }}

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ASSET_PATH }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
