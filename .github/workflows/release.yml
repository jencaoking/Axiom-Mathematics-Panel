name: MathLab v3.0 Release Pipeline

on:
  push:
    # 触发条件：只有当您推送以 v3. 开头的 tag 时，才会触发打包发布
    tags:
      - 'v3.*'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # 矩阵构建：同时在 Windows 和 macOS 上启动打包机
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: 1. 拉取最新代码 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 配置 Python 环境 (Setup Python)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 推荐使用 3.11，对 PySide6 兼容性极佳
          cache: 'pip'           # 开启缓存，加速后续打包

      - name: 3. 安装依赖 (Install Dependencies)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 4. 执行 PyInstaller 编译 (Build Executable)
        # 依赖项目根目录下的 mathlab.spec 文件进行精准打包
        run: pyinstaller mathlab.spec --clean

      - name: 5. 压缩产物 - Windows (Zip for Windows)
        if: matrix.os == 'windows-latest'
        # Windows 环境下使用 PowerShell 压缩 dist 目录下的程序
        run: Compress-Archive -Path dist/MathLab/* -DestinationPath MathLab-${{ github.ref_name }}-Windows.zip

      - name: 6. 压缩产物 - macOS (Zip for macOS)
        if: matrix.os == 'macos-latest'
        # macOS 环境下打包 .app 文件
        run: |
          cd dist
          zip -r ../MathLab-${{ github.ref_name }}-macOS.zip MathLab.app

      - name: 7. 发布到 GitHub Releases (Create Release)
        uses: softprops/action-gh-release@v2
        with:
          # 自动附带生成的压缩包
          files: |
            MathLab-*-Windows.zip
            MathLab-*-macOS.zip
          # 自动生成 Release Notes（拉取最近的 commit 记录）
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}