name: CD - Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset_path: mathlab/dist/MathLab-${{ github.ref_name }}-Windows.exe
          - os: macos-latest
            asset_path: MathLab-${{ github.ref_name }}-macOS.zip

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mathlab/requirements.txt
        pip install -r mathlab/requirements-optional.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        cd mathlab
        pyinstaller build_spec.spec

    - name: Prepare Windows Asset
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        # Rename exe to include version tag
        mv mathlab/dist/MathLab.exe "${{ matrix.asset_path }}"

    - name: Prepare macOS Asset
      if: matrix.os == 'macos-latest'
      run: |
        cd mathlab/dist
        zip -r "../../${{ matrix.asset_path }}" MathLab.app

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ matrix.asset_path }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
