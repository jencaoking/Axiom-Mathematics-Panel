name: Code Quality

# ── 触发条件 ──────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
    paths:
      - 'mathlab/**.py'
      - 'requirements.txt'
      - '.github/workflows/code-quality.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'mathlab/**.py'
      - 'requirements.txt'
      - '.github/workflows/code-quality.yml'
  workflow_dispatch:

# ── 权限配置（最小权限原则）──────────────────────────────────────────────
permissions:
  contents: read
  checks: write
  pull-requests: write

# ── 并发控制 ──────────────────────────────────────────────────────────────
concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: 代码风格检查 (Flake8)
  # ────────────────────────────────────────────────────────────────────────
  flake8:
    name: Flake8 Style Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Flake8
        run: pip install flake8 flake8-pyproject

      - name: Run Flake8
        run: |
          echo "🔍 正在检查代码风格 (Flake8)..."
          flake8 mathlab/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501 \
            --exclude=mathlab/resources/,mathlab/logs/ \
            --count \
            --statistics \
            --show-source

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: 代码分析 (Pylint)
  # ────────────────────────────────────────────────────────────────────────
  pylint:
    name: Pylint Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Pylint and dependencies
        run: |
          pip install pylint
          pip install -r requirements.txt

      - name: Run Pylint
        run: |
          echo "🔍 正在进行深度代码分析 (Pylint)..."
          pylint mathlab/ \
            --rcfile=.pylintrc \
            --disable=R,C \
            --fail-under=5.0 \
            --output-format=parseable > pylint-report.txt

      - name: Upload Pylint report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: pylint-report
          path: pylint-report.txt
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────
  # Job 3: 类型检查 (MyPy)
  # ────────────────────────────────────────────────────────────────────────
  mypy:
    name: MyPy Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install MyPy and dependencies
        run: |
          pip install mypy types-PyYAML
          pip install -r requirements.txt

      - name: Run MyPy
        run: |
          echo "🔍 正在进行类型检查 (MyPy)..."
          mypy mathlab/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --warn-unused-ignores \
            --warn-redundant-casts \
            --disallow-untyped-defs=False \
            --exclude 'mathlab/resources/'

  # ────────────────────────────────────────────────────────────────────────
  # Job 4: 导入完整性检查 (项目特有)
  # ────────────────────────────────────────────────────────────────────────
  import-check:
    name: Import Integrity Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify all internal imports
        run: |
          echo "🔍 正在验证所有内部导入的完整性..."
          python -c "
          import ast
          import os
          import sys
          from pathlib import Path

          errors = []
          mathlab_dir = Path('mathlab')

          for py_file in mathlab_dir.rglob('*.py'):
              if 'resources' in py_file.parts:
                  continue
              try:
                  with open(py_file, 'r', encoding='utf-8') as f:
                      tree = ast.parse(f.read(), filename=str(py_file))

                  for node in ast.walk(tree):
                      if isinstance(node, ast.ImportFrom):
                          module = node.module or ''
                          if module.startswith('mathlab'):
                              for alias in node.names:
                                  name = alias.name
                                  if name.startswith('_') or name in ('*',):
                                      continue
                                  module_path = module.replace('.', '/') + '.py'
                                  if not os.path.exists(module_path):
                                      pkg_path = module.replace('.', '/') + '/__init__.py'
                                      if not os.path.exists(pkg_path):
                                          errors.append(f'{py_file}:{node.lineno}: 模块 {module} 不存在')
              except SyntaxError as e:
                  errors.append(f'{py_file}: 语法错误 - {e}')

          if errors:
              print('❌ 发现导入问题:')
              for err in errors:
                  print(f'  - {err}')
              sys.exit(1)
          else:
              print('✅ 所有内部导入检查通过')
          "

  # ────────────────────────────────────────────────────────────────────────
  # Job 5: 安全扫描 (Bandit)
  # ────────────────────────────────────────────────────────────────────────
  bandit:
    name: Bandit Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit security scan
        run: |
          echo "🔍 正在进行安全扫描 (Bandit)..."
          bandit -r mathlab/ \
            -x mathlab/resources,mathlab/logs \
            -f json \
            -o bandit-report.json \
            -ll

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────
  # Job 6: 依赖安全检查 (Safety)
  # ────────────────────────────────────────────────────────────────────────
  safety:
    name: Safety Dependency Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety check
        run: |
          echo "🔍 正在检查依赖安全漏洞 (Safety)..."
          safety check \
            --file=requirements.txt \
            --output=json \
            --save-json=safety-report.json

      - name: Upload Safety report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: safety-report
          path: safety-report.json
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────
  # Job 7: 代码格式检查 (Black + Isort)
  # ────────────────────────────────────────────────────────────────────────
  format-check:
    name: Black & Isort Format Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Black and Isort
        run: pip install black isort

      - name: Check Black formatting
        run: |
          echo "🔍 检查 Black 代码格式..."
          black mathlab/ \
            --check \
            --line-length=120 \
            --extend-exclude='mathlab/resources|mathlab/logs' \
            --diff

      - name: Check Isort import order
        run: |
          echo "🔍 检查 Isort 导入顺序..."
          isort mathlab/ \
            --check-only \
            --profile black \
            --skip-glob='mathlab/resources/*' \
            --skip-glob='mathlab/logs/*' \
            --diff

  # ────────────────────────────────────────────────────────────────────────
  # Job 8: 汇总报告
  # ────────────────────────────────────────────────────────────────────────
  summary:
    name: Quality Summary
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [flake8, pylint, mypy, import-check, bandit, safety, format-check]
    if: always()
    steps:
      - name: Generate summary
        env:
          FLAKE8_RESULT: ${{ needs.flake8.result }}
          PYLINT_RESULT: ${{ needs.pylint.result }}
          MYPY_RESULT: ${{ needs.mypy.result }}
          IMPORT_CHECK_RESULT: ${{ needs.import-check.result }}
          BANDIT_RESULT: ${{ needs.bandit.result }}
          SAFETY_RESULT: ${{ needs.safety.result }}
          FORMAT_CHECK_RESULT: ${{ needs.format-check.result }}
        run: |
          {
            echo "## 📊 代码质量检查报告"
            echo ""
            echo "| 检查项 | 状态 |"
            echo "|--------|------|"
            echo "| Flake8 风格检查 | ${FLAKE8_RESULT} |"
            echo "| Pylint 代码分析 | ${PYLINT_RESULT} |"
            echo "| MyPy 类型检查 | ${MYPY_RESULT} |"
            echo "| 导入完整性 | ${IMPORT_CHECK_RESULT} |"
            echo "| Bandit 安全扫描 | ${BANDIT_RESULT} |"
            echo "| Safety 依赖检查 | ${SAFETY_RESULT} |"
            echo "| Black/Isort 格式 | ${FORMAT_CHECK_RESULT} |"
            echo ""
            echo "状态说明: ✅ success = 通过, ❌ failure = 失败, ⏭️ skipped = 跳过"
          } >> "$GITHUB_STEP_SUMMARY"
