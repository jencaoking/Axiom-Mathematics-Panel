[mypy]
ignore_missing_imports = true
no_strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = false
exclude = ['mathlab/resources/']

[mypy-mathlab.core.geogebra_engine]
ignore_errors = true

[mypy-mathlab.core.ai_provider_config]
ignore_errors = true

[mypy-mathlab.data.file_manager]
ignore_errors = true

[mypy-mathlab.ui.properties_panel]
ignore_errors = true

[mypy-mathlab.ui.animations]
ignore_errors = true

[mypy-mathlab.ui.ai_cursor]
ignore_errors = true

[mypy-mathlab.core.smart_guides]
ignore_errors = true

[mypy-mathlab.core.prompt_manager]
ignore_errors = true

[mypy-mathlab.ui.preferences_dialog]
ignore_errors = true

[mypy-mathlab.core.command_manager]
ignore_errors = true

[mypy-mathlab.utils.i18n_manager]
ignore_errors = true

[mypy-mathlab.ui.algebra_panel]
ignore_errors = true