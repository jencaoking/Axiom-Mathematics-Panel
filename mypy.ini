[mypy]
python_version = 3.11
ignore_missing_imports = true
no_strict_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_defs = false
exclude = mathlab/resources/

[mypy-mathlab.core.geogebra_engine]
ignore_errors = true

[mypy-mathlab.core.ai_provider_config]
ignore_errors = true

[mypy-mathlab.data.file_manager]
ignore_errors = true

[mypy-mathlab.core.smart_guides]
ignore_errors = true

[mypy-mathlab.core.prompt_manager]
ignore_errors = true

[mypy-mathlab.core.command_manager]
ignore_errors = true

[mypy-mathlab.core.jupyter_manager]
ignore_errors = true

[mypy-mathlab.ui.*]
ignore_errors = true

[mypy-mathlab.plugins.*]
ignore_errors = true

[mypy-mathlab.utils.*]
ignore_errors = true
