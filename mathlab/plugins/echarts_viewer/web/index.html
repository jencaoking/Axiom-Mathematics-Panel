<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MathLab ECharts Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1e1e1e; }
        #chart-container { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <script>
        // 初始化 ECharts 实例 (使用深色主题)
        var myChart = echarts.init(document.getElementById('chart-container'), 'dark');
        var pythonBackend = null;

        // 设置 WebChannel 与 Python 建立连接
        new QWebChannel(qt.webChannelTransport, function(channel) {
            pythonBackend = channel.objects.py_bridge;
            pythonBackend.js_log("ECharts 渲染引擎已就绪！");
        });

        // 暴露给 Python 调用的全局渲染函数
        window.renderChart = function(jsonData) {
            const payload = JSON.parse(jsonData);
            
            // 组装 ECharts 配置项
            const option = {
                backgroundColor: 'transparent',
                tooltip: { trigger: 'axis' }, // 鼠标悬浮提示
                dataZoom: [{ type: 'inside' }, { type: 'slider' }], // 允许滚轮缩放
                xAxis: { type: 'category', data: payload.x_data },
                yAxis: { type: 'value' },
                series: [{
                    name: payload.title || 'Data',
                    data: payload.y_data,
                    type: 'line',
                    smooth: true, // 平滑曲线
                    symbolSize: 6,
                    itemStyle: { color: '#007acc' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: 'rgba(0,122,204,0.5)'},
                            {offset: 1, color: 'rgba(0,122,204,0.0)'}
                        ])
                    }
                }]
            };
            
            myChart.setOption(option);
            if(pythonBackend) pythonBackend.js_log("图表已成功渲染 " + payload.x_data.length + " 个数据点。");
        };

        // 监听图表点击事件，并回传给 Python
        myChart.on('click', function (params) {
            if(pythonBackend) {
                pythonBackend.handle_chart_click(params.seriesName, parseFloat(params.name), parseFloat(params.value));
            }
        });
        
        // 窗口缩放自适应
        window.addEventListener('resize', () => myChart.resize());
    </script>
</body>
</html>
