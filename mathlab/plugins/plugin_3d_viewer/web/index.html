<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathLab 3D Surface Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d14;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }

    /* ── HUD 顶栏 ── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: linear-gradient(90deg, rgba(15,15,28,0.92), rgba(20,20,40,0.92));
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(80,120,255,0.18);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 10;
      user-select: none;
    }
    #hud .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #6ab0ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #hud .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }

    /* 工具按钮 */
    .hud-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(100,140,255,0.25);
      background: rgba(100,140,255,0.08);
      color: #b0c4f8;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }
    .hud-btn:hover  { background: rgba(100,140,255,0.22); border-color: rgba(100,140,255,0.5); color: #e8f0ff; }
    .hud-btn.active { background: rgba(100,140,255,0.30); border-color: #6a9fff; color: #fff; }

    /* 信息徽章 */
    #info-badge {
      margin-left: auto;
      font-size: 11px;
      color: #7090c0;
      white-space: nowrap;
    }

    /* ── 状态栏 ── */
    #statusbar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 26px;
      background: rgba(10,10,20,0.85);
      border-top: 1px solid rgba(80,120,255,0.12);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 16px;
      font-size: 11px;
      color: #5070a0;
      z-index: 10;
    }
    #statusbar span { color: #8aabdf; }

    /* ── 加载遮罩 ── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d14;
      z-index: 20;
      gap: 18px;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(100,160,255,0.15);
      border-top-color: #6ab0ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: #6080b0; }

    canvas { display: block; }
  </style>
</head>
<body>

  <!-- 加载遮罩 -->
  <div id="loading">
    <div class="spinner"></div>
    <p>正在初始化 3D 渲染引擎…</p>
  </div>

  <!-- HUD 顶栏 -->
  <div id="hud">
    <span class="logo">◈ MathLab 3D Engine</span>
    <div class="sep"></div>
    <button class="hud-btn active" id="btn-solid"    onclick="setMode('solid')">实体</button>
    <button class="hud-btn"        id="btn-wireframe" onclick="setMode('wireframe')">线框</button>
    <button class="hud-btn"        id="btn-both"      onclick="setMode('both')">叠加</button>
    <div class="sep"></div>
    <button class="hud-btn" onclick="resetCamera()">重置视角</button>
    <div id="info-badge">等待渲染…</div>
  </div>

  <!-- 状态栏 -->
  <div id="statusbar">
    顶点数: <span id="stat-verts">—</span>
    &nbsp;|&nbsp; Z 范围: <span id="stat-zrange">—</span>
    &nbsp;|&nbsp; 拖拽旋转 · 滚轮缩放 · 右键平移
  </div>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <!-- Qt WebChannel 通信脚本 -->
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

  <script>
  // ════════════════════════════════════════════════════════════════
  //  1. 场景初始化
  // ════════════════════════════════════════════════════════════════
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0d14);
  scene.fog = new THREE.Fog(0x0d0d14, 80, 160);

  const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1, 1000
  );
  camera.position.set(18, 16, 18);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // ── 轨道控制器 ──────────────────────────────────────────────────
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor  = 0.06;
  controls.minDistance    = 5;
  controls.maxDistance    = 100;

  // ── 光照 ────────────────────────────────────────────────────────
  const ambientLight = new THREE.AmbientLight(0x223366, 1.4);
  scene.add(ambientLight);

  const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight1.position.set(20, 30, 20);
  dirLight1.castShadow = true;
  scene.add(dirLight1);

  const dirLight2 = new THREE.DirectionalLight(0x4060ff, 0.5);
  dirLight2.position.set(-20, 10, -10);
  scene.add(dirLight2);

  const pointLight = new THREE.PointLight(0x00aaff, 0.8, 80);
  pointLight.position.set(0, 20, 0);
  scene.add(pointLight);

  // ── 网格辅助线 ──────────────────────────────────────────────────
  const gridHelper = new THREE.GridHelper(40, 40, 0x1a2040, 0x141c30);
  scene.add(gridHelper);

  const axesHelper = new THREE.AxesHelper(6);
  scene.add(axesHelper);

  // ════════════════════════════════════════════════════════════════
  //  2. 状态变量
  // ════════════════════════════════════════════════════════════════
  let currentMesh      = null;   // 实体曲面 Mesh
  let currentWireframe = null;   // 线框 Mesh
  let renderMode       = 'solid'; // 'solid' | 'wireframe' | 'both'
  let window_backend   = null;    // Qt 通信对象

  // ════════════════════════════════════════════════════════════════
  //  3. 颜色映射（科学渐变 colormap，依据归一化高度着色）
  // ════════════════════════════════════════════════════════════════
  function heightToColor(t) {
    // 冷→暖渐变：深蓝 → 青 → 绿 → 黄 → 红
    const stops = [
      { t: 0.00, r: 0.05, g: 0.10, b: 0.40 },
      { t: 0.25, r: 0.05, g: 0.45, b: 0.80 },
      { t: 0.50, r: 0.10, g: 0.75, b: 0.55 },
      { t: 0.75, r: 0.95, g: 0.80, b: 0.10 },
      { t: 1.00, r: 0.90, g: 0.15, b: 0.05 },
    ];
    let a = stops[0], b = stops[stops.length - 1];
    for (let i = 0; i < stops.length - 1; i++) {
      if (t >= stops[i].t && t <= stops[i + 1].t) {
        a = stops[i]; b = stops[i + 1]; break;
      }
    }
    const f = (b.t === a.t) ? 0 : (t - a.t) / (b.t - a.t);
    return new THREE.Color(
      a.r + (b.r - a.r) * f,
      a.g + (b.g - a.g) * f,
      a.b + (b.b - a.b) * f
    );
  }

  // ════════════════════════════════════════════════════════════════
  //  4. 核心渲染函数（由 Python 通过 runJavaScript 调用）
  // ════════════════════════════════════════════════════════════════
  window.renderSurface = function(jsonData) {
    let data;
    try { data = JSON.parse(jsonData); }
    catch (e) {
      if (window_backend) window_backend.js_error('JSON 解析失败: ' + e.message);
      return;
    }

    // ── 清理上一帧曲面 ────────────────────────────────────────────
    if (currentMesh) {
      scene.remove(currentMesh);
      currentMesh.geometry.dispose();
      currentMesh.material.dispose();
      currentMesh = null;
    }
    if (currentWireframe) {
      scene.remove(currentWireframe);
      currentWireframe.geometry.dispose();
      currentWireframe.material.dispose();
      currentWireframe = null;
    }

    const { size, segments, z_values, z_min, z_max } = data;
    const zRange = (z_max - z_min) || 1;

    // ── 构建平面几何体并修改顶点高度 ─────────────────────────────
    const geometry = new THREE.PlaneGeometry(size, size, segments, segments);
    geometry.rotateX(-Math.PI / 2);   // 翻转至水平朝上

    const positions = geometry.attributes.position.array;
    const vertCount = z_values.length;

    // 顶点颜色缓冲区（用于实体着色）
    const colors = new Float32Array(vertCount * 3);

    for (let i = 0; i < vertCount; i++) {
      const z = z_values[i];
      positions[i * 3 + 1] = z;           // Y 轴即高度（PlaneGeometry 旋转后）

      const t = (z - z_min) / zRange;     // 归一化 [0,1]
      const c = heightToColor(t);
      colors[i * 3]     = c.r;
      colors[i * 3 + 1] = c.g;
      colors[i * 3 + 2] = c.b;
    }

    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.computeVertexNormals();

    // ── 实体材质（Phong + 顶点颜色）───────────────────────────────
    const solidMat = new THREE.MeshPhongMaterial({
      vertexColors: true,
      side:         THREE.DoubleSide,
      shininess:    55,
      specular:     new THREE.Color(0x222244),
    });

    currentMesh = new THREE.Mesh(geometry, solidMat);
    currentMesh.castShadow    = true;
    currentMesh.receiveShadow = true;

    // ── 线框材质（浅色叠加）───────────────────────────────────────
    const wireMat = new THREE.MeshBasicMaterial({
      color:       0x4488cc,
      wireframe:   true,
      transparent: true,
      opacity:     0.18,
    });
    currentWireframe = new THREE.Mesh(geometry.clone(), wireMat);

    scene.add(currentMesh);
    scene.add(currentWireframe);
    applyRenderMode();

    // ── 更新 HUD 信息 ─────────────────────────────────────────────
    document.getElementById('info-badge').textContent =
      `${data.shape || '曲面'} · ${segments}×${segments} 网格`;
    document.getElementById('stat-verts').textContent =
      vertCount.toLocaleString();
    document.getElementById('stat-zrange').textContent =
      `[${z_min.toFixed(3)}, ${z_max.toFixed(3)}]`;

    // 隐藏加载遮罩
    document.getElementById('loading').classList.add('hidden');

    // 回调 Python
    if (window_backend) window_backend.on_mesh_ready(vertCount);
  };

  // ════════════════════════════════════════════════════════════════
  //  5. 渲染模式切换
  // ════════════════════════════════════════════════════════════════
  function applyRenderMode() {
    if (!currentMesh) return;
    if (renderMode === 'solid') {
      currentMesh.visible      = true;
      currentWireframe.visible = false;
    } else if (renderMode === 'wireframe') {
      currentMesh.visible      = false;
      currentWireframe.visible = true;
      currentWireframe.material.opacity = 0.9;
    } else { // 'both'
      currentMesh.visible      = true;
      currentWireframe.visible = true;
      currentWireframe.material.opacity = 0.18;
    }
  }

  window.setMode = function(mode) {
    renderMode = mode;
    ['solid', 'wireframe', 'both'].forEach(m => {
      document.getElementById('btn-' + m).classList.toggle('active', m === mode);
    });
    applyRenderMode();
  };

  window.resetCamera = function() {
    camera.position.set(18, 16, 18);
    controls.reset();
  };

  // ════════════════════════════════════════════════════════════════
  //  6. Qt WebChannel 初始化
  // ════════════════════════════════════════════════════════════════
  if (typeof QWebChannel !== 'undefined') {
    new QWebChannel(qt.webChannelTransport, function(channel) {
      window_backend = channel.objects.py_bridge;
      window_backend.js_log('Three.js 引擎就绪，等待 Python 推送数据。');
    });
  }

  // ════════════════════════════════════════════════════════════════
  //  7. 动画渲染循环
  // ════════════════════════════════════════════════════════════════
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  // ── 响应窗口大小变化 ─────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  </script>
</body>
</html>
