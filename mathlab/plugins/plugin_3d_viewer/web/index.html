<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathLab 3D Surface Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d14;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
    }

    /* ── HUD 顶栏 ── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: linear-gradient(90deg, rgba(15,15,28,0.92), rgba(20,20,40,0.92));
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(80,120,255,0.18);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 10;
      user-select: none;
    }
    #hud .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #6ab0ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #hud .sep { width: 1px; height: 20px; background: rgba(255,255,255,0.12); }

    /* 工具按钮 */
    .hud-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(100,140,255,0.25);
      background: rgba(100,140,255,0.08);
      color: #b0c4f8;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
    }
    .hud-btn:hover  { background: rgba(100,140,255,0.22); border-color: rgba(100,140,255,0.5); color: #e8f0ff; }
    .hud-btn.active { background: rgba(100,140,255,0.30); border-color: #6a9fff; color: #fff; }

    /* 信息徽章 */
    #info-badge {
      margin-left: auto;
      font-size: 11px;
      color: #7090c0;
      white-space: nowrap;
    }

    /* ── 状态栏 ── */
    #statusbar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 26px;
      background: rgba(10,10,20,0.85);
      border-top: 1px solid rgba(80,120,255,0.12);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 16px;
      font-size: 11px;
      color: #5070a0;
      z-index: 10;
    }
    #statusbar span { color: #8aabdf; }

    /* ── 加载遮罩 ── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d0d14;
      z-index: 20;
      gap: 18px;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(100,160,255,0.15);
      border-top-color: #6ab0ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: #6080b0; }

    canvas { display: block; }
  </style>
</head>
<body>

  <!-- 加载遮罩 -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Initializing 3D Render Engine...</p>
  </div>

  <!-- HUD 顶栏 -->
  <div id="hud">
    <span class="logo">◈ MathLab 3D Engine</span>
    <div class="sep"></div>
    <button class="hud-btn" onclick="resetCamera()">重置视角</button>
    <div id="info-badge">动态几何画板</div>
  </div>

  <!-- 状态栏 -->
  <div id="statusbar">
    拖拽旋转 · 滚轮缩放 · 右键平移
  </div>

  <!-- Three.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/DragControls.js"></script>
  <!-- Qt WebChannel 通信脚本 -->
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

  <script>
    let scene, camera, renderer, orbitControls, dragControls;
    let window_backend = null;
    let mathObjects = new THREE.Group(); // 专门存放数学物体的容器
    let draggableMeshes = []; // 存放可以被拖拽的点

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0d0d14);
        scene.fog = new THREE.Fog(0x0d0d14, 80, 160);
        
        scene.add(mathObjects);

        camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            0.1, 1000
        );
        camera.position.set(18, 16, 18);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor  = 0.06;
        orbitControls.minDistance    = 5;
        orbitControls.maxDistance    = 100;

        // 初始化拖拽控制器
        dragControls = new THREE.DragControls(draggableMeshes, camera, renderer.domElement);
        
        dragControls.addEventListener('dragstart', function (event) {
            orbitControls.enabled = false; // 拖动点时禁用视角旋转
        });
        
        dragControls.addEventListener('drag', function (event) {
            // 当鼠标拖动点时，实时通知 Python 后端
            if (window_backend && event.object.userData.id) {
                let id = event.object.userData.id;
                let p = event.object.position;
                window_backend.update_point_from_js(id, p.x, p.y, p.z);
            }
        });
        
        dragControls.addEventListener('dragend', function (event) {
            orbitControls.enabled = true; // 恢复视角旋转
        });

        // ── 光照 ────────────────────────────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0x223366, 1.4);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight1.position.set(20, 30, 20);
        dirLight1.castShadow = true;
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x4060ff, 0.5);
        dirLight2.position.set(-20, 10, -10);
        scene.add(dirLight2);

        const pointLight = new THREE.PointLight(0x00aaff, 0.8, 80);
        pointLight.position.set(0, 20, 0);
        scene.add(pointLight);

        // ── 网格辅助线 ──────────────────────────────────────────────────
        const gridHelper = new THREE.GridHelper(40, 40, 0x1a2040, 0x141c30);
        scene.add(gridHelper);

        const axesHelper = new THREE.AxesHelper(6);
        scene.add(axesHelper);

        // ── 动态 3D 波纹曲面网格 ──────────────────────────────────────────
        window.surfaceGeometry = new THREE.BufferGeometry();
        var material = new THREE.MeshStandardMaterial({ 
            color: 0x00ffcc, 
            wireframe: true,       // 使用网格线模式，看起来极具科技感
            side: THREE.DoubleSide 
        });
        var surfaceMesh = new THREE.Mesh(window.surfaceGeometry, material);
        scene.add(surfaceMesh);
    }

    init();

    window.updateScene = function(payload_str) {
        let objects = JSON.parse(payload_str);
        
        // 1. 清空旧画布
        mathObjects.clear();
        draggableMeshes.length = 0; 
        
        const matPoint = new THREE.MeshPhongMaterial({ color: 0xff3366 });
        const matSphere = new THREE.MeshPhongMaterial({ color: 0x3388ff, transparent: true, opacity: 0.3, wireframe: true });
        const matLine = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });

        // 2. 遍历重建
        objects.forEach(obj => {
            if (obj.type === 'Point') {
                let geo = new THREE.SphereGeometry(0.2, 16, 16);
                let mesh = new THREE.Mesh(geo, matPoint);
                let coords = obj.coordinates;
                mesh.position.set(coords.x || 0, coords.y || 0, coords.z || 0);
                mesh.userData = { id: obj.id, type: 'Point' };
                mathObjects.add(mesh);
                draggableMeshes.push(mesh); // 将点加入可拖拽数组
                
            } else if (obj.type === 'Sphere') {
                let coords = obj.coordinates;
                let geo = new THREE.SphereGeometry(coords.r || 1, 32, 32);
                let mesh = new THREE.Mesh(geo, matSphere);
                mesh.position.set(coords.cx || 0, coords.cy || 0, coords.cz || 0);
                mathObjects.add(mesh);
                
            } else if (obj.type === 'Segment') {
                let coords = obj.coordinates;
                // 判断是否含有 Z 坐标，兼容 2D 和 3D
                let z1 = coords.z1 || 0; let z2 = coords.z2 || 0;
                let points = [
                    new THREE.Vector3(coords.x1, coords.y1, z1),
                    new THREE.Vector3(coords.x2, coords.y2, z2)
                ];
                let geo = new THREE.BufferGeometry().setFromPoints(points);
                let line = new THREE.Line(geo, matLine);
                mathObjects.add(line);
            }
        });
        
        // 更新拖拽控制器的检测列表
        dragControls.objects = draggableMeshes;
        
        // 隐藏加载遮罩
        document.getElementById('loading').classList.add('hidden');
    };

    window.resetCamera = function() {
        camera.position.set(18, 16, 18);
        orbitControls.reset();
    };

    // 提供给 Python Bridge (QWebChannel) 高频调用的核心更新函数
    window.updateSurfaceGeometry = function(flatVertexArray) {
        // 1. 将 Python 传过来的普通 Array 直接包装为 WebGL 专属的 Float32Array
        var vertices = new Float32Array(flatVertexArray);
        
        // 2. 核心性能关键：直接用 BufferAttribute 覆写显卡顶点缓冲区，实现零拷贝渲染
        window.surfaceGeometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        
        // 3. 重新让 WebGL 计算光照法线 (制造逼真的光影反光波动)
        window.surfaceGeometry.computeVertexNormals();
    };

    if (typeof QWebChannel !== 'undefined') {
        new QWebChannel(qt.webChannelTransport, function(channel) {
            window_backend = channel.objects.py_bridge;
            window_backend.js_log('Three.js 引擎就绪，等待 Python 推送数据。');
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        orbitControls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
