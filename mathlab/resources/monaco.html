<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>MathLab Advanced Editor</title>
    <style>
        /* 消除浏览器默认边距，让编辑器完美贴合 PySide6 窗口 */
        html, body, #editor-container { 
            width: 100%; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #0f172a; /* 赛博朋克深沉底色 */
        }
    </style>
    
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    
    <script src="./dist/mathlab_editor.bundle.js"></script>
</head>
<body>
    <div id="editor-container"></div>
    
    <script>
        // ==========================================
        // AI 幽灵文本补全引擎 (Ghost Text Copilot)
        // ==========================================

        let currentCompletionResolve = null;
        let currentCompletionReqId = 0;

        // 当页面和打包文件都加载完毕后执行
        window.onload = function() {
            // 1. 初始化我们用 TypeScript 写的 MathLab 编辑器
            if (window.initMathLabEditor) {
                window.initMathLabEditor('editor-container');
            } else {
                console.error("编辑器引擎加载失败，请检查 mathlab_editor.bundle.js 是否正确打包。");
            }

            // 2. 建立与 Python (PySide6) 后端的双向通信
            if (typeof qt !== 'undefined' && qt.webChannelTransport) {
                new QWebChannel(qt.webChannelTransport, function(channel) {
                    // 获取 Python 暴露过来的 backend 对象
                    window.backend = channel.objects.backend;
                    
                    // 3. 注册快捷键：拦截用户的 Ctrl+Enter 或 Cmd+Enter
                    window.mathEditor.editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, function() {
                        let currentCode = window.mathEditor.getCode();
                        
                        // 呼叫 Python 后端去执行 Jupyter 沙盒代码！
                        if (window.backend && window.backend.execute_code) {
                            window.backend.execute_code(currentCode);
                        }
                    });
                });
            } else {
                console.warn("未检测到 Qt WebChannel 环境，当前处于纯前端预览模式。");
            }

            // 注册 Python 语言的内联补全提供者
            if (typeof monaco !== 'undefined') {
                monaco.languages.registerInlineCompletionsProvider('python', {
                    provideInlineCompletions: async function (model, position, context, token) {
                        // 如果当前是主动触发（比如用户刚刚按了退格），尽量减少无意义请求
                        if (context.triggerKind === monaco.languages.InlineCompletionTriggerKind.Explicit) {
                            return { items: [] };
                        }

                        // 1. 获取光标前后的上下文 (Context)
                        const prefix = model.getValueInRange({
                            startLineNumber: 1,
                            startColumn: 1,
                            endLineNumber: position.lineNumber,
                            endColumn: position.column
                        });
                        
                        // 为了节省 Token 和加快响应，后缀最多只取光标后 500 个字符
                        const fullSuffix = model.getValueInRange({
                            startLineNumber: position.lineNumber,
                            startColumn: position.column,
                            endLineNumber: model.getLineCount(),
                            endColumn: model.getLineMaxColumn(model.getLineCount())
                        });
                        const suffix = fullSuffix.substring(0, 500);

                        // 2. 生成唯一的请求 ID，避免网络延迟导致旧补全覆盖新补全
                        currentCompletionReqId++;
                        const reqId = currentCompletionReqId;

                        // 3. 将补全请求发送给 Python 后端，并挂起当前 Promise
                        return new Promise((resolve) => {
                            currentCompletionResolve = resolve;
                            if (window.backend) {
                                window.backend.request_ghost_text(reqId, prefix, suffix);
                            } else {
                                resolve({ items: [] });
                            }
                        });
                    },
                    freeInlineCompletions: function(completions) {
                        // 释放内存时的回调
                    }
                });
            }
        };
        
        // 供 Python 异步回调的全局函数
        function receiveGhostText(reqId, text) {
            // 只有当回调的 reqId 是最新请求时，才将灰显文本展示出来
            if (reqId === currentCompletionReqId && currentCompletionResolve) {
                if (text && text.trim() !== "") {
                    currentCompletionResolve({
                        items: [{
                            insertText: text // Monaco 会自动处理光标位置和渲染为幽灵文本
                        }]
                    });
                } else {
                    currentCompletionResolve({ items: [] });
                }
            }
        }
        
        // ==========================================
        // 暴露给 Python 调用的全局 API (供 PySide6 调用)
        // ==========================================
        
        // 读取代码
        function getEditorContent() { 
            return window.mathEditor.getCode(); 
        }
        
        // 写入代码
        function setEditorContent(text) { 
            window.mathEditor.setCode(text); 
        }
        
        // 设置错误红波浪线 (接收 JSON 字符串)
        function setEditorErrors(errorsJson) { 
            try {
                let errors = JSON.parse(errorsJson);
                window.mathEditor.setDiagnostics(errors);
            } catch (e) {
                console.error("解析错误诊断信息失败:", e);
            }
        }

        // 清空当前代码并准备接收 AI 流
        function clearForAIFix() {
            window.mathEditor.editor.setValue("");
        }

        // 流式追加代码 (打字机效果)
        function appendEditorContent(chunk) {
            const model = window.mathEditor.editor.getModel();
            const lineCount = model.getLineCount();
            const lastLineLength = model.getLineMaxColumn(lineCount);
            
            // 在文档末尾插入文本
            model.applyEdits([{
                range: new monaco.Range(lineCount, lastLineLength, lineCount, lastLineLength),
                text: chunk
            }]);
            
            // 滚动到最底部，保持视觉跟随
            window.mathEditor.editor.revealLine(model.getLineCount());
        }
    </script>
</body>
</html>
